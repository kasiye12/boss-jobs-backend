version: '3.8'

services:
  app:
    build: .
    container_name: boss-jobs-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=boss_jobs_ethiopia
      - DB_USER=postgres
      - DB_PASSWORD=secure_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./logs:/usr/src/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - boss-jobs-network

  postgres:
    image: postgres:15-alpine
    container_name: boss-jobs-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=boss_jobs_ethiopia
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - boss-jobs-network

  redis:
    image: redis:7-alpine
    container_name: boss-jobs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - boss-jobs-network

volumes:
  postgres-data:
  redis-data:

networks:
  boss-jobs-network:
    driver: bridge
